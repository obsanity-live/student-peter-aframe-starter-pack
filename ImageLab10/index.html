<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>

      <a-sky src="Assets/beach.jpg"></a-sky>

      <a-cone position="0 1.25 -4" height=1.75 rotation="180" color="33FFFF"></a-cone>
      <a-sphere position="0 2.2 -4" radius="0.9" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -2" radius="0.5" height="1.5" src="Assets/rock.jpeg"></a-cylinder>
      <a-cylinder position="2 0.75 -2" radius="0.5" height="1.5" src="Assets/rock.jpeg"></a-cylinder>
      <a-cylinder position="1 0.75 -1" radius="0.5" height="1.5" src="Assets/rock.jpeg"></a-cylinder>
      <a-cylinder position="2 0.75 -1" radius="0.5" height="1.5" src="Assets/rock.jpeg"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" src="Assets/sand.jpeg"></a-plane>
      <a-box position="1.75 0.75 -1.5" height="1.5" rotation="180" src="Assets/rock.jpeg"></a-box>

      

    </a-scene>
  </body>
</html>
