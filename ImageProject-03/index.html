<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>

      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="10" height="10" src="Assets/grid2.png"></a-plane>
       <a-assets>

        <a-asset-item id="destroyer" src="Assets/01/scene.gltf"></a-asset-item>
        <a-asset-item id="lightcycle" src="Assets/03/s3.gltf"></a-asset-item>
        <a-asset-item id="man" src="Assets/04/scene.gltf"></a-asset-item>
      

      </a-assets>

      
      <a-entity
        gltf-model="#lightcycle"
        position="0 0 -4"
        scale="5 5 5  "></a-entity>
      

      <a-entity
        gltf-model="#destroyer"
        position="0 5 -5"
        scale="2 2 2">
      </a-entity>

      <a-entity
        gltf-model="#man"
        position="0 0 -5"
        scale="5 5 5"
        color="#F009FF"></a-entity>
      
      
    
      <a-sky src="Assets/tron Backround edit.png"></a-sky>
    </a-scene>
  </body>
</html>
